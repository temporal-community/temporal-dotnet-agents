name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      packregistry:
        description: 'Package registry to publish to'
        type: choice
        required: true
        options:
          - GitHub
          - NuGet

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Build
        run: just build

      - name: Run unit tests
        run: just test-unit

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Pack
        run: just pack

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages/
          if-no-files-found: error

  publish:
    name: Publish (${{ github.event.inputs.packregistry }})
    runs-on: ubuntu-latest
    needs: [package]
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: artifacts/packages/

      - name: Publish to GitHub Packages
        if: github.event.inputs.packregistry == 'GitHub'
        run: |
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --api-key "${{ secrets.NUGET_PAT }}" \
            --source "https://nuget.pkg.github.com/cecilphillip/index.json" \
            --skip-duplicate

      - name: Publish to NuGet.org
        if: github.event.inputs.packregistry == 'NuGet'
        run: |
          dotnet nuget push "artifacts/packages/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
